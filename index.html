<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>

  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* FULL SCREEN SCROLL */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.post-card {
  height: 100vh;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  background: black;
}

/* MEDIA FULLSCREEN */
.post-card video,
.post-card img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT (bottom left) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
}

.post-actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
}

.post-actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
}
.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.tap-unmute {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#topNav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  color: #aaa;
  font-weight: bold;
  background: transparent;
  z-index: 20;
  padding: 10px 0;
}

#topNav .active {
  color: white;
  border-bottom: 2px solid white;
  padding-bottom: 3px;
}

#topNav .search {
  position: absolute;
  right: 15px;
}
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: transparent;
  display: flex;
  justify-content: space-around;
  align-items: center;
  color: white;
  z-index: 20;
}

#plusBtn {
  background: white;
  color: black;
  font-size: 28px;
  padding: 5px 15px;
  border-radius: 12px;
  position: relative;
}

/* TikTok gradient edges */
#plusBtn::before {
  content: "";
  position: absolute;
  left: -5px;
  right: -5px;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, cyan, pink);
  border-radius: 14px;
  z-index: -1;
}
#topNav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 1000;
}
#posts {
  padding-top: 60px;
  padding-bottom: 70px;
}

</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kixxdbkfvigunvxbvmfy.supabase.co",
  "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M"
);

let currentPostId = null;

const { data: { session } } = await supabase.auth.getSession();

/* ================= AUTH ================= */

if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {

/* ================= UI ================= */

document.getElementById("app").innerHTML = `

<div id="topNav">
  <span>STEM</span>
  <span>Explore</span>
  <span class="active">Following</span>
  <span>For You</span>
  <span class="search">🔍</span>
</div>

<div id="posts"></div>

<div id="bottomNav">
  <div>🏠</div>
  <div>👥</div>
  <div id="plusBtn">＋</div>
  <div>💬</div>
  <div>👤</div>
</div>

`;

/* ================= LOGOUT ================= */

document.getElementById("logout").onclick = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* ================= CREATE POST ================= */

document.getElementById("postBtn").onclick = async () => {
  const content = document.getElementById("postInput").value;
  const file = document.getElementById("fileInput").files[0];

  if (!content && !file) return;

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage
      .from("posts_media")
      .upload(fileName, file);

    if (error) return alert(error.message);

    const { data } = supabase.storage
      .from("posts_media")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  await supabase.from("posts").insert([{
    user_id: session.user.id,
    name: session.user.user_metadata.full_name,
    content,
    file_url: fileUrl
  }]);

  loadPosts();
  document.getElementById("postInput").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("preview").innerHTML = "";
};

/* ================= LOAD POSTS ================= */

async function loadPosts() {
  const { data: posts } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  if (!posts || posts.length === 0) {
    container.innerHTML = "No posts yet";
    return;
  }

  posts.forEach(renderPost);
}
setTimeout(setupAutoPlay, 300);
/* ================= RENDER POST ================= */

function renderPost(post) {
  const postsDiv = document.getElementById("posts");

  if (document.getElementById(post.id)) return;

  const div = document.createElement("div");
  div.id = post.id;

  div.className = "post-card";
div.id = post.id;

div.innerHTML = `
  ${
    post.file_url
      ? /\.(mp4|webm|ogg|mov)$/i.test(post.file_url)
        ? `<video 
            src="${post.file_url}" 
            class="post-video"
            muted
            loop
            playsinline
            autoplay>
          </video>
          <div class="tap-unmute">🔊 Tap to unmute</div>`
        : `<img src="${post.file_url}" />`
      : ""
  }

  <div class="post-text">
    <b>${post.name}</b><br>
    ${post.content || ""}
  </div>

  <div class="post-actions">
    <button onclick="event.stopPropagation(); likePost(${post.id})">
      ❤️ ${post.likes || 0}
    </button>

    <button onclick="event.stopPropagation(); openComments(${post.id})">
      💬
    </button>

    <button onclick="event.stopPropagation(); openFullscreen(this)">
      ⛶
    </button>
  </div>
`;
  postsDiv.appendChild(div);
}

/* ================= LIKE ================= */

window.likePost = async (id) => {
  const { data: post } = await supabase
    .from("posts")
    .select("likes, liked_by")
    .eq("id", id)
    .single();

  let likedBy = post.liked_by || [];
  const userId = session.user.id;

  const isLiked = likedBy.includes(userId);

  likedBy = isLiked
    ? likedBy.filter(id => id !== userId)
    : [...likedBy, userId];

  const likes = isLiked
    ? (post.likes || 1) - 1
    : (post.likes || 0) + 1;

  await supabase.from("posts").update({
    likes,
    liked_by: likedBy
  }).eq("id", id);

  loadPosts();
};

/* ================= COMMENTS ================= */

window.openComments = (postId) => {
  currentPostId = postId;
  document.getElementById("commentsPanel").classList.add("active");
  loadComments(postId);
};

document.getElementById("closeComments").onclick = () => {
  document.getElementById("commentsPanel").classList.remove("active");
};

async function loadComments(postId) {
  const { data } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId);

  const container = document.getElementById("panelComments");

  container.innerHTML = data.map(c => `
    <div><b>${c.name}</b>: ${c.content}</div>
  `).join("");
}

document.getElementById("panelPostBtn").onclick = async () => {
  const input = document.getElementById("panelInput");

  if (!input.value) return;

  await supabase.from("comments").insert({
    post_id: currentPostId,
    content: input.value,
    user_id: session.user.id,
    name: session.user.user_metadata.full_name
  });

  input.value = "";
  loadComments(currentPostId);
};

/* ================= PREVIEW ================= */

document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];
  const preview = document.getElementById("preview");

  if (!file) return;

  const url = URL.createObjectURL(file);

  preview.innerHTML = file.type.startsWith("video")
    ? `<video src="${url}" controls style="width:100%"></video>`
    : `<img src="${url}" style="width:100%">`;
});

document.addEventListener("click", (e) => {
  if (e.target.classList.contains("post-video")) {
    const video = e.target;
    const wrapper = video.parentElement;
    const label = wrapper.querySelector(".tap-unmute");

    if (video.muted) {
      video.muted = false;
      video.play();

      if (label) label.style.opacity = "0"; // hide text
    } else {
      video.muted = true;

      if (label) label.style.opacity = "1"; // show again
    }
  }
});

function setupAutoPlay() {
  const videos = document.querySelectorAll("video");

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.play();
      } else {
        entry.target.pause();
      }
    });
  }, { threshold: 0.7 });

  videos.forEach(video => observer.observe(video));
}

/* ================= START ================= */

loadPosts();

}
</script>
</body>
</html>
