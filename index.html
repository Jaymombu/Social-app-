<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>
  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* 🔥 FULL SCREEN SCROLL */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  padding-top: 60px;   /* space for top nav */
  padding-bottom: 70px; /* space for bottom nav */
}

/* 📱 POST CARD */
.post-card {
  height: auto;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  background: black;
}

/* 🎥 MEDIA FULLSCREEN */
.post-card video,
.post-card img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 📝 TEXT (bottom left) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
  color: white;
  z-index: 2;
}

/* ❤️ ACTIONS (right side vertical) */
.post-actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 2;
}

.post-actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
}

/* 🔊 TAP TO UNMUTE */
.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.tap-unmute {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  pointer-events: none;
}

/* 🔝 TOP NAV */
#topNav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: #aaa;
  font-weight: bold;
  z-index: 1000;
}

#topNav .active {
  color: white;
  border-bottom: 2px solid white;
}

#topNav .search {
  position: absolute;
  right: 15px;
}

/* 🔽 BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 1000;
}

/* ➕ PLUS BUTTON */
#plusBtn {
  background: white;
  color: black;
  font-size: 28px;
  padding: 5px 15px;
  border-radius: 12px;
  position: relative;
}

#plusBtn::before {
  content: "";
  position: absolute;
  left: -5px;
  right: -5px;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, cyan, pink);
  border-radius: 14px;
  z-index: -1;
}

/* 📝 CREATE PANEL */
#createPanel {
  position: fixed;
  bottom: 80px;
  left: 10px;
  right: 10px;
  background: #111;
  padding: 10px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
}

/* ❤️ LIKE ANIMATION */
.like-btn.pop {
  transform: scale(1.2);
  transition: 0.2s;
}
#posts {
  position: relative;
  z-index: 1;
}

#topNav {
  z-index: 1000;
}

#bottomNav {
  z-index: 1000;
}

#createPanel {
  z-index: 1001;
}
#commentsPanel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: #111;
  color: white;
  transition: bottom 0.3s ease;
  z-index: 2000;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

#commentsPanel.active {
  bottom: 0;
}

.comments-content {
  padding: 15px;
}

</style>
</head>
<body>

<div id="app"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kixxdbkfvigunvxbvmfy.supabase.co",
  "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M"
);

console.log("🚀 Starting app...");

// ✅ 1. GET SESSION FIRST
let session = null;

try {
  const result = await supabase.auth.getSession();
  session = result.data.session;
  console.log("✅ session:", session);
} catch (err) {
  console.log("❌ session error:", err);
}

// ✅ 2. DEFINE renderPost FIRST (GLOBAL)
function renderPost(post) {
  if (!post.content && !post.file_url) return;

  const postsDiv = document.getElementById("posts");
  const time = new Date(post.created_at).toLocaleString();
  const isOwner = session && session.user.id === post.user_id;
  
  const div = document.createElement("div");

  div.style.padding = "15px";
  div.style.borderBottom = "1px solid #333";

  div.innerHTML = `
  <div style="font-weight:bold;">
  ${post.name.split("@")[0]}
</div>
  <div style="font-size:12px;color:#aaa;">${time}</div>
  <div style="margin-top:5px;">${post.content || ""}</div>

  ${
    isOwner
      ? `
    <button onclick="deletePost('${post.id}')" style="
      margin-top:8px;
      background:#ff4d4d;
      border:none;
      color:white;
      padding:5px 8px;
      border-radius:5px;
    ">
      Delete
    </button>
  `
      : ""
  }
`;

  postsDiv.appendChild(div);
}

// ✅ 3. DEFINE loadPosts
window.loadPosts = async function () {
  console.log("🔥 loadPosts running...");

  const { data: posts, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("📦 posts:", posts);
  console.log("❌ error FULL:", JSON.stringify(error, null, 2));

  const postsDiv = document.getElementById("posts");

  if (!postsDiv) {
    console.log("🚨 posts div NOT FOUND");
    return;
  }

  postsDiv.innerHTML = "";

  if (error) {
    postsDiv.innerHTML = "❌ Error loading posts";
    return;
  }

  if (!posts || posts.length === 0) {
    postsDiv.innerHTML = "😢 No posts yet";
    return;
  }

  posts.forEach(renderPost);
}; // ✅ IMPORTANT (you were missing this)

window.deletePost = async (id) => {
  const { error } = await supabase.from("posts").delete().eq("id", id);

  if (error) {
    console.log("❌ delete error:", error);
    return;
  }

  loadPosts();
};

// ✅ ALWAYS show posts UI
document.getElementById("app").innerHTML = `
  <div style="padding: 10px;">

    ${
      session
        ? `
      <div style="
        margin-bottom: 15px;
        background: #111;
        padding: 10px;
        border-radius: 10px;
      ">
        <textarea 
          id="postInput"
          placeholder="What's on your mind?"
          style="
            width: 100%;
            height: 60px;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px;
          "
        ></textarea>

        <button id="postBtn" style="
          margin-top: 8px;
          padding: 8px 12px;
          background: #1d9bf0;
          border: none;
          color: white;
          border-radius: 6px;
        ">
          Post
        </button>
      </div>
      `
        : `
      <button id="login" style="margin-bottom:10px;">
        Login
      </button>
      `
    }

    <div id="posts"></div>
  </div>
`;
// ✅ Show login button only if NOT logged in
if (session) {
  document.getElementById("postBtn").onclick = async () => {
    const input = document.getElementById("postInput");
    const content = input.value.trim();

    if (!content) return;

    console.log("📤 posting:", content);

    const { error } = await supabase.from("posts").insert([
{
  content: content,
  user_id: session.user.id,
  name: session.user.email
}
]);

    if (error) {
      console.log("❌ post error:", error);
      return;
    }

    input.value = "";

    // reload posts
    loadPosts();
  };
}
loadPosts();
setInterval(loadPosts, 5000); // refresh every 5s
</script>
</body>
</html>
