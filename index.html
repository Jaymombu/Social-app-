<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";
const supabase = createClient(supabaseUrl, supabaseKey);

// 🔥 FIRST: handle Google redirect
await supabase.auth.exchangeCodeForSession(window.location.href);

// THEN: get session
const { data } = await supabase.auth.getSession();
const session = data.session;

if (!session || !session.user) {
  // NOT LOGGED IN
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {
  // ✅ LOGGED IN
  document.getElementById("app").innerHTML = `
    <h3>Welcome ${session.user.user_metadata.full_name}</h3>

    <textarea id="postInput" placeholder="Write something..."></textarea><br>
    <button id="postBtn">Post</button>
    <button id="logout">Logout</button>

    <h3>Posts</h3>
    <div id="posts"></div>
  `;

  // logout
  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  // add post
  document.getElementById("postBtn").onclick = async () => {
    const content = document.getElementById("postInput").value;

    await supabase.from("posts").insert([
  {
    user_id: session.user.id,
    name: session.user.user_metadata.full_name || session.user.email,
    avatar: session.user.user_metadata?.avatar_url || 
        session.user.user_metadata?.picture || "",
content: content
  }
]);

    location.reload();
  };

  // load posts
  const { data: posts } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const postsDiv = document.getElementById("posts");

  posts.forEach(post => {
  const div = document.createElement("div");
  div.innerHTML = `
<div style="display:flex; align-items:center; gap:10px;">
  <img src="${post.avatar && post.avatar.startsWith('http') ? post.avatar : 'https://via.placeholder.com/40'}"
       width="40" height="40"
       style="border-radius:50%; object-fit:cover;" />

  <div>
    <strong>${post.name || "Unknown user"}</strong>
    <p>${post.content}</p>
    <small>${new Date(post.created_at).toLocaleString()}</small>

    ${post.user_id === session.user.id 
      ? `<button onclick="deletePost('${post.id}')">Delete</button>` 
      : ""}
      
  </div>
</div>
<hr>
`;
  postsDiv.appendChild(div);
});
}

window.deletePost = async function(id) {
  await supabase.from("posts").delete().eq("id", id);
  location.reload();
};
</script>

</body>
</html>
