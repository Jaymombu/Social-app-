<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>
  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* 🔥 FULL SCREEN SCROLL */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  padding-top: 60px;   /* space for top nav */
  padding-bottom: 70px; /* space for bottom nav */
}

/* 📱 POST CARD */
.post-card {
  height: auto;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  background: black;
}

/* 🎥 MEDIA FULLSCREEN */
.post-card video,
.post-card img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 📝 TEXT (bottom left) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
  color: white;
  z-index: 2;
}

/* ❤️ ACTIONS (right side vertical) */
.post-actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 2;
}

.post-actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
}

/* 🔊 TAP TO UNMUTE */
.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.tap-unmute {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  pointer-events: none;
}

/* 🔝 TOP NAV */
#topNav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: #aaa;
  font-weight: bold;
  z-index: 1000;
}

#topNav .active {
  color: white;
  border-bottom: 2px solid white;
}

#topNav .search {
  position: absolute;
  right: 15px;
}

/* 🔽 BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 1000;
}

/* ➕ PLUS BUTTON */
#plusBtn {
  background: white;
  color: black;
  font-size: 28px;
  padding: 5px 15px;
  border-radius: 12px;
  position: relative;
}

#plusBtn::before {
  content: "";
  position: absolute;
  left: -5px;
  right: -5px;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, cyan, pink);
  border-radius: 14px;
  z-index: -1;
}

/* 📝 CREATE PANEL */
#createPanel {
  position: fixed;
  bottom: 80px;
  left: 10px;
  right: 10px;
  background: #111;
  padding: 10px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
}

/* ❤️ LIKE ANIMATION */
.like-btn.pop {
  transform: scale(1.2);
  transition: 0.2s;
}
#posts {
  position: relative;
  z-index: 1;
}

#topNav {
  z-index: 1000;
}

#bottomNav {
  z-index: 1000;
}

#createPanel {
  z-index: 1001;
}
#commentsPanel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: #111;
  color: white;
  transition: bottom 0.3s ease;
  z-index: 2000;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

#commentsPanel.active {
  bottom: 0;
}

.comments-content {
  padding: 15px;
}

</style>

<div id="app"></div>

<script type="module">

const supabase = createClient(

console.log("🚀 Starting app...");

// ✅ GLOBAL SESSION
let session = null;

let currentProfileId = null;

  function renderPost(post) {
  if (!post.content && !post.file_url) return;

  const postsDiv = document.getElementById("posts");
  const time = new Date(post.created_at).toLocaleString();

  const isOwner =
    session?.user?.id &&
    String(session.user.id) === String(post.user_id);

  const isLiked = (post.liked_by || []).includes(session?.user?.id);

  const div = document.createElement("div");
div.id = post.id;

  div.innerHTML = `
    <div style="display:flex; align-items:center; gap:10px;">
      <img 
        src="${profile?.avatar_url || 'https://via.placeholder.com/60'}"
        style="width:40px;height:40px;border-radius:50%;object-fit:cover;background:#222;"
      />

      <div>
        <div onclick="openProfile('${post.user_id}', '${post.name}')" 
             style="font-weight:bold;cursor:pointer;">
          ${post.name}
        </div>

        <div style="font-size:12px;color:#aaa;">
          ${time}
        </div>
      </div>
    </div>

    <div style="margin-top:10px;">
      ${post.content || ""}
    </div>

    <div style="margin-top:8px;">
      ❤️ ${post.likes || 0}
    </div>

    <button onclick="likePost('${post.id}')"
      style="margin-top:5px;background:${isLiked ? '#ff4d6d' : '#222'};color:white;border:none;padding:5px 10px;border-radius:5px;">
      ${isLiked ? "❤️ Liked" : "🤍 Like"} (${post.likes || 0})
    </button>

    <button onclick="openComments('${post.id}')"
      style="margin-top:5px;background:#333;color:white;border:none;padding:5px 10px;border-radius:5px;">
      💬 Comment
    </button>

    ${
      isOwner
        ? `<button onclick="deletePost('${post.id}')"
            style="margin-top:8px;background:#ff4d4d;border:none;color:white;padding:5px 8px;border-radius:5px;">
            Delete
          </button>`
        : ""
    }
  `;

  postsDiv.appendChild(div);
}

// ✅ 3. DEFINE loadPosts
window.loadPosts = async function () {
  console.log("🔥 loadPosts running...");

  const { data: posts, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("📦 posts:", posts);
  console.log("❌ error FULL:", JSON.stringify(error, null, 2));

  const postsDiv = document.getElementById("posts");

  if (!postsDiv) {
    console.log("🚨 posts div NOT FOUND");
    return;
  }

  postsDiv.innerHTML = "";

  if (error) {
    postsDiv.innerHTML = "❌ Error loading posts";
    return;
  }

  if (!posts || posts.length === 0) {
    postsDiv.innerHTML = "😢 No posts yet";
    return;
  }

  posts.forEach(renderPost);
}; // ✅ IMPORTANT (you were missing this)

window.likePost = async (id) => {
  const userId = session?.user?.id;

  if (!userId) {
    alert("Login to like posts");
    return;
  }

  const postDiv = document.getElementById(id);
  const btn = postDiv?.querySelector("button");

  // get current post
  const { data: post, error } = await supabase
    .from("posts")
    .select("likes, liked_by")
    .eq("id", id)
    .single();

  if (error) {
    console.log("❌ fetch error:", error);
    return;
  }

  let likedBy = post.liked_by || [];
  const isLiked = likedBy.includes(userId);

  let newLikes;
  let updatedLikedBy;

  if (isLiked) {
    updatedLikedBy = likedBy.filter(uid => uid !== userId);
    newLikes = (post.likes || 1) - 1;
  } else {
    updatedLikedBy = [...likedBy, userId];
    newLikes = (post.likes || 0) + 1;
  }

  // ✅ INSTANT UI UPDATE (no waiting)
  if (btn) {
    btn.innerHTML = `${!isLiked ? "❤️ Liked" : "🤍 Like"} (${newLikes})`;
    btn.style.background = !isLiked ? "#ff4d6d" : "#222";
  }

  // 🔥 save to database
  await supabase
    .from("posts")
    .update({
      likes: newLikes,
      liked_by: updatedLikedBy
    })
    .eq("id", id);

  // ❌ REMOVE THIS (realtime will handle updates)
  // loadPosts();
};

window.deletePost = async (id) => {
  const { error } = await supabase.from("posts").delete().eq("id", id);

  if (error) {
    console.log("❌ delete error:", error);
    return;

  loadPosts();
};

let currentPostId = null;

  currentPostId = postId;

  panel.style.display = "flex";

  console.log("📥 loading comments for:", postId);

    .from("comments")
    .select("*")
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  const container = document.getElementById("panelComments");

  if (error) {
  console.log("❌ profile fetch error:", error);
}

// ✅ DO NOT RETURN — continue anyway

  if (!data || data.length === 0) {
    container.innerHTML = "No comments yet";
    return;
  }

  container.innerHTML = data.map(c => `
    <div style="margin-bottom:5px;">
      <b>${c.name}</b>: ${c.content}

  `).join("");

  // ✅ THEN load posts

    .from("posts")

    .order("created_at", { ascending: false });

  if (error) {

  }

    return;
  }

  container.innerHTML = posts.map(post => `
    <div style="border-bottom:1px solid #333; padding:10px 0;">
      <div>${post.content || ""}</div>
      <div style="font-size:12px;color:#aaa;">
        ${new Date(post.created_at).toLocaleString()}
      </div>
    </div>
  `).join("");
};

async function resizeImage(file, size = 300) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = size;
      canvas.height = size;

      // crop center square
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;

      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);

      canvas.toBlob(
        (blob) => {
          resolve(blob);
        },
        "image/jpeg",
        0.8 // compression
      );
    };

    reader.readAsDataURL(file);
  });
}

  window.openEditProfile = async () => {
  alert("EDIT FUNCTION RUNNING");

  const { data: sessionData } = await supabase.auth.getSession();
  session = sessionData.session;

  if (!session?.user) {
    alert("You are not logged in");
    return;
  }

  const user = session.user;

  // ✅ SAFE FETCH (no crashing)
  const { data, error } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  console.log("PROFILE DATA:", data);
  console.log("PROFILE ERROR:", error);

  // ❌ DO NOT STOP if error

  document.getElementById("app").innerHTML = `
    <div style="padding:15px; color:white;">
      <button onclick="goHome()">← Back</button>

      <h2>Edit Profile</h2>

      <input id="editName" placeholder="Name" value="${data?.name || ""}" />
      <input type="file" id="avatarFile" accept="image/*" />
      <textarea id="editBio" placeholder="Bio">${data?.bio || ""}</textarea>

      <button id="saveProfile">Save</button>
    </div>
  `;

  document.getElementById("saveProfile").onclick = async () => {
  const name = document.getElementById("editName").value;
  const bio = document.getElementById("editBio").value;

  const fileInput = document.getElementById("avatarFile");
  const file = fileInput.files[0];

  let avatarUrl = null;

  if (file) {
    const resizedFile = await resizeImage(file, 300);

    const fileName = `${session.user.id}.jpg`;

    const { error: uploadError } = await supabase.storage
      .from("avatars")
      .upload(fileName, resizedFile, {
        cacheControl: "3600",
        upsert: true
      });

    if (uploadError) {
      alert("Upload failed");
      console.log(uploadError);
      return;
    }

    const { data: publicUrlData } = supabase.storage
      .from("avatars")
      .getPublicUrl(fileName);

    avatarUrl = publicUrlData.publicUrl;
  }

  const { data: oldProfile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", user.id)
    .single();

  const { error } = await supabase.from("profiles").upsert({
    id: user.id,
    name,
    avatar_url: avatarUrl || oldProfile?.avatar_url,
    bio
  });

  if (error) {
    alert("Save failed");
    console.log(error);
    return;
  }

  openProfile(user.id, name);
};
};

// ✅ START APP FUNCTION (you were missing this too)

window.openProfile = openProfile;
window.openEditProfile = openEditProfile;

</script>
