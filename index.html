<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";
const supabase = createClient(supabaseUrl, supabaseKey);

// 🔥 FIRST: handle Google redirect
await supabase.auth.exchangeCodeForSession(window.location.href);

// THEN: get session
const { data } = await supabase.auth.getSession();
const session = data.session;

if (!session || !session.user) {
  // NOT LOGGED IN
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {
  // ✅ LOGGED IN
  document.getElementById("app").innerHTML = `
    <h3>Welcome ${session.user.user_metadata.full_name}</h3>

    <textarea id="postInput" placeholder="Write something..."></textarea><br>
    <button id="postBtn">Post</button>
    <button id="logout">Logout</button>

    <h3>Posts</h3>
    <div id="posts"></div>
  `;

  // logout
  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  // add post
  document.getElementById("postBtn").onclick = async () => {
  const content = document.getElementById("postInput").value;

  await supabase.from("posts").insert([
    {
      user_id: session.user.id,
      name:
        session.user.user_metadata.full_name ||
        session.user.user_metadata.name ||
        session.user.email,
      avatar:
        session.user.user_metadata?.avatar_url ||
        session.user.user_metadata?.picture ||
        "",
      content: content
    }
  ]);

  // ✅ ADD THIS HERE (instead of reload)
  renderPost({
    user_id: session.user.id,
    name:
      session.user.user_metadata.full_name ||
      session.user.user_metadata.name ||
      session.user.email,
    avatar:
      session.user.user_metadata?.avatar_url ||
      session.user.user_metadata?.picture ||
      "",
    content: content,
    created_at: new Date().toISOString(),
    id: Math.random()
  });

  // optional: clear input
  document.getElementById("postInput").value = "";
};

  // load posts
  const { data: posts } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });
    posts.forEach(renderPost);

// ✅ ADD REALTIME HERE
supabase
  .channel("posts-channel")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "posts" },
    (payload) => {
      renderPost(payload.new);
    }
  )
  .on(
    "postgres_changes",
    { event: "DELETE", schema: "public", table: "posts" },
    (payload) => {
      removePost(payload.old.id);
    }
  )
  .on(
    "postgres_changes",
    { event: "UPDATE", schema: "public", table: "posts" },
    (payload) => {
      updatePostUI(payload.new);
    }
  )
  .subscribe();

  const postsDiv = document.getElementById("posts");

  function renderPost(post) {
  const postsDiv = document.getElementById("posts");

  const div = document.createElement("div");
div.id = post.id;

  div.innerHTML = `
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="${
      post.avatar && post.avatar.startsWith("http")
        ? post.avatar
        : "https://via.placeholder.com/40"
    }"
    width="40"
    height="40"
    style="border-radius:50%; object-fit:cover;" />

    <div>
      <strong>${post.name || "Unknown user"}</strong>
      <p>${post.content}</p>
      <small>${new Date(post.created_at).toLocaleString()}</small>

      ${post.user_id === session.user.id
  ? `
    <button onclick="editPost('${post.id}', \`${post.content}\`)">Edit</button>
    <button onclick="deletePost('${post.id}')">Delete</button>
  `
  : ""
}
    </div>
  </div>
  <hr>
`;

  postsDiv.prepend(div);
}
function removePost(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
function updatePostUI(post) {
  const el = document.getElementById(post.id);
  if (!el) return;

  el.querySelector("p").textContent = post.content;
}
function editPost(id, oldContent) {
  const newContent = prompt("Edit your post:", oldContent);

  if (newContent === null) return; // user cancelled

  updatePost(id, newContent);
}
async function updatePost(id, content) {
  await supabase
    .from("posts")
    .update({ content: content })
    .eq("id", id);
}

window.deletePost = async function(id) {
  await supabase.from("posts").delete().eq("id", id);
};
}
</script>

</body>
</html>
