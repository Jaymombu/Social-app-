<!DOCTYPE html>
<html>
<head>
  <title>Social App</title>
</head>
<body>

<h2>Login with Google</h2>
<button id="login">Sign in with Google</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";

const supabase = createClient(supabaseUrl, supabaseKey);

// 🔥 IMPORTANT: wait for session AFTER redirect
const { data, error } = await supabase.auth.getSession();
const session = data.session;

// 👇 If logged in
if (session) {
  document.body.innerHTML = `
    <h2>Welcome ${session.user.email}</h2>
    <button id="logout">Logout</button>
  `;

  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };
}

// 👇 Login button (WITH redirect fix)
document.getElementById("login").onclick = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://jaymombu.github.io/Social-app-/"
    }
  });
};
</script>

</body>
</html>
