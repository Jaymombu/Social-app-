<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>
  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* 🔥 FULL SCREEN SCROLL */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  padding-top: 60px;   /* space for top nav */
  padding-bottom: 70px; /* space for bottom nav */
}

/* 📱 POST CARD */
.post-card {
  height: auto;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  background: black;
}

/* 🎥 MEDIA FULLSCREEN */
.post-card video,
.post-card img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 📝 TEXT (bottom left) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
  color: white;
  z-index: 2;
}

/* ❤️ ACTIONS (right side vertical) */
.post-actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 2;
}

.post-actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
}

/* 🔊 TAP TO UNMUTE */
.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.tap-unmute {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  pointer-events: none;
}

/* 🔝 TOP NAV */
#topNav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: #aaa;
  font-weight: bold;
  z-index: 1000;
}

#topNav .active {
  color: white;
  border-bottom: 2px solid white;
}

#topNav .search {
  position: absolute;
  right: 15px;
}

/* 🔽 BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 1000;
}

/* ➕ PLUS BUTTON */
#plusBtn {
  background: white;
  color: black;
  font-size: 28px;
  padding: 5px 15px;
  border-radius: 12px;
  position: relative;
}

#plusBtn::before {
  content: "";
  position: absolute;
  left: -5px;
  right: -5px;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, cyan, pink);
  border-radius: 14px;
  z-index: -1;
}

/* 📝 CREATE PANEL */
#createPanel {
  position: fixed;
  bottom: 80px;
  left: 10px;
  right: 10px;
  background: #111;
  padding: 10px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
}

/* ❤️ LIKE ANIMATION */
.like-btn.pop {
  transform: scale(1.2);
  transition: 0.2s;
}
#posts {
  position: relative;
  z-index: 1;
}

#topNav {
  z-index: 1000;
}

#bottomNav {
  z-index: 1000;
}

#createPanel {
  z-index: 1001;
}
#commentsPanel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: #111;
  color: white;
  transition: bottom 0.3s ease;
  z-index: 2000;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

#commentsPanel.active {
  bottom: 0;
}

.comments-content {
  padding: 15px;
}

</style>
</head>
<body>

<div id="app"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kixxdbkfvigunvxbvmfy.supabase.co",
  "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M"
);

console.log("🚀 Starting app...");

// ✅ 1. GET SESSION FIRST
let session = null;

try {
  const result = await supabase.auth.getSession();
  session = result.data.session;
  console.log("✅ session:", session);
} catch (err) {
  console.log("❌ session error:", err);
}

// ✅ 2. DEFINE renderPost FIRST (GLOBAL)
function renderPost(post) {
  const postsDiv = document.getElementById("posts");

  const div = document.createElement("div");
  div.innerHTML = `<b>${post.name}</b><br>${post.content}`;

  postsDiv.appendChild(div);
}

// ✅ 3. DEFINE loadPosts
window.loadPosts = async function () {
  console.log("🔥 loadPosts running...");

  const { data: posts, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("📦 posts:", posts);
  console.log("❌ error:", error);

  const postsDiv = document.getElementById("posts");

  if (!postsDiv) {
    console.log("🚨 posts div NOT FOUND");
    return;
  }

  postsDiv.innerHTML = "";

  if (error) {
    postsDiv.innerHTML = "❌ Error loading posts";
    return;
  }

  if (!posts || posts.length === 0) {
    postsDiv.innerHTML = "😢 No posts yet";
    return;
  }

  posts.forEach(renderPost);
}; // ✅ IMPORTANT (you were missing this)

// ✅ 4. NOW check session + build UI
if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login</button>
  `;
} else {
  document.getElementById("app").innerHTML = `
    <div id="posts"></div>
  `;

  // ✅ 5. NOW CALL
  loadPosts();
}

</script>
</body>
</html>
