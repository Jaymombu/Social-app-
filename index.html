<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
}

#app {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* Header */
.header {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Input */
textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  outline: none;
}

/* Buttons */
button {
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

/* Post Card */
.post-card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* Post Header */
.post-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #dfe6e9;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  font-weight: bold;
}

.name {
  font-weight: bold;
}

.time {
  font-size: 12px;
  color: gray;
}

/* Actions */
.actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}

.like-btn {
  background: #ffeaa7;
}
.like-btn {
  display: inline-block;
  transition: transform 0.2s ease;
}

.like-btn:active {
  transform: scale(1.3);
}

.edit-btn {
  background: #dfe6e9;
}

.delete-btn {
  background: #ff7675;
  color: white;
}

/* Comments */
.comment-box {
  margin-top: 15px;
}

.comment {
  background: #f1f3f6;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 5px;
  font-size: 14px;
}
.heart-pop {
  position: absolute;
  font-size: 18px;
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% {
    transform: scale(0.6) translateY(0) rotate(0deg);
    opacity: 1;
  }
  50% {
    transform: scale(1.3) translateY(-20px) rotate(10deg);
  }
  100% {
    transform: scale(1) translateY(-60px) rotate(-10deg);
    opacity: 0;
  }
}
.big-heart {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 80px; /* bigger */
  opacity: 0;
  animation: bigPop 0.8s ease forwards;
  pointer-events: none;
}

@keyframes bigPop {
  0% {
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
  }
  40% {
    transform: translate(-50%, -50%) scale(1.4);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
  }
}
.floating-heart {
  position: absolute;
  font-size: 22px;
  pointer-events: none;
  animation: floatUp 1.2s ease-out forwards;
  filter: drop-shadow(0 0 6px rgba(255, 0, 100, 0.6));
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.8) rotate(0deg);
    opacity: 1;
  }
  50% {
    transform: translateY(-40px) scale(1.3) rotate(15deg);
  }
  100% {
    transform: translateY(-100px) scale(1.6) rotate(-10deg);
    opacity: 0;
  }
}
#posts div {
  position: relative;
}
.like-btn {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* 💥 click animation */
.like-btn.animate {
  transform: scale(1.3);
  box-shadow: 0 0 10px rgba(255, 200, 0, 0.8);
}

/* ✨ subtle bounce back */
@keyframes likePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.like-btn.pop {
  animation: likePop 0.3s ease;
}
.ripple {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255, 0, 100, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: rippleEffect 0.6s ease-out;
  pointer-events: none;
}

@keyframes rippleEffect {
  to {
    transform: translate(-50%, -50%) scale(8);
    opacity: 0;
  }
}
.like-btn.pop {
  transform: scale(1.25);
  background: #ffe066;
  transition: 0.2s;
}
.like-btn {
  transition: all 0.2s ease;
}

.like-btn.pop {
  transform: scale(1.3);
  background: #ffe066;
}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";
const supabase = createClient(supabaseUrl, supabaseKey, {
  auth: {
    detectSessionInUrl: true,
    persistSession: true
  }
});

const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {
  document.getElementById("app").innerHTML = `
    <h3>Welcome ${session.user.user_metadata.full_name}</h3>

    <textarea id="postInput"></textarea><br>
    <button id="postBtn">Post</button>
    <button id="logout">Logout</button>

    <h3>Notifications</h3>
    <div id="notifications"></div>

    <h3>Posts</h3>
    <div id="posts"></div>
  `;

  // ✅ LOGOUT
  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  // ✅ CREATE POST
  document.getElementById("postBtn").onclick = async () => {
    const content = document.getElementById("postInput").value;
    if (!content) return;

    await supabase.from("posts").insert([{
      user_id: session.user.id,
      name: session.user.user_metadata.full_name,
      content
    }]);

    document.getElementById("postInput").value = "";
  };

  // ✅ LOAD POSTS
  async function loadPosts() {
    const { data: posts } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "";

    if (!posts) return;
    posts.forEach(renderPost);
  }

  // ✅ RENDER POST
  function renderPost(post) {
    const postsDiv = document.getElementById("posts");

    if (document.getElementById(post.id)) return;

    const div = document.createElement("div");
    let lastTap = 0;

div.addEventListener("click", () => {
  const now = Date.now();

  if (now - lastTap < 300) {
    likePost(post.id);
    showHeart(div);
  }

  lastTap = now;
});
    div.id = post.id;

    div.innerHTML = `
      <div class="post-card">
        <b>${post.name}</b><br>
        ${post.content}<br>

        
        <button onclick="likePost(${post.id})">
  ${post.liked_by?.includes(session.user.id) ? "❤️" : "🤍"} ${post.likes || 0}
</button>

        ${
          post.user_id === session.user.id
          ? `<button onclick="deletePost(${post.id})">Delete</button>`
          : ""
        }

        <div id="comments-${post.id}"></div>

        <input id="commentInput-${post.id}" placeholder="Comment..." />
        <button onclick="addComment(${post.id})">Post</button>
      </div>
    `;

    postsDiv.appendChild(div);
    loadComments(post.id);
  }

  // ✅ DELETE
  window.deletePost = async (id) => {
    await supabase.from("posts").delete().eq("id", id);
  };

  // ✅ LIKE
  window.likePost = async (id) => {
  const userId = session.user.id;

  const { data: post } = await supabase
    .from("posts")
    .select("likes, liked_by, user_id")
    .eq("id", id)
    .single();

  let likedBy = post.liked_by || [];

  let newLikes;
  let updatedLikedBy;

  if (likedBy.includes(userId)) {
    // 🔁 UNLIKE
    updatedLikedBy = likedBy.filter(id => id !== userId);
    newLikes = (post.likes || 1) - 1;
  } else {
    // ❤️ LIKE
    updatedLikedBy = [...likedBy, userId];
    newLikes = (post.likes || 0) + 1;

    // 🔔 notification
    if (post.user_id !== userId) {
      await supabase.from("notifications").insert([{
        user_id: post.user_id,
        sender_id: userId,
        post_id: id,
        type: "like"
      }]);
    }
  }

  await supabase
    .from("posts")
    .update({
      likes: newLikes,
      liked_by: updatedLikedBy
    })
    .eq("id", id);
};

  // ✅ COMMENTS
  window.addComment = async (postId) => {
    const input = document.getElementById(`commentInput-${postId}`);
    if (!input.value) return;

    await supabase.from("comments").insert([{
      post_id: postId,
      user_id: session.user.id,
      name: session.user.user_metadata.full_name,
      content: input.value
    }]);

    input.value = "";
  };

  function renderComment(comment) {
    const container = document.getElementById(`comments-${comment.post_id}`);
    if (!container) return;

    const div = document.createElement("div");
    div.innerHTML = `<b>${comment.name}</b>: ${comment.content}`;

    container.appendChild(div);
  }

  async function loadComments(postId) {
    const { data } = await supabase
      .from("comments")
      .select("*")
      .eq("post_id", postId);

    data.forEach(renderComment);
  }

  // ✅ NOTIFICATIONS
  async function loadNotifications() {
  const { data } = await supabase
    .from("notifications")
    .select("*")
    .eq("user_id", session.user.id);

  const container = document.getElementById("notifications");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "No notifications";
    return;
  }

  data.forEach((n) => {
    const div = document.createElement("div");

    if (n.type === "like") {
      div.innerHTML = "❤️ Someone liked your post";
    } else if (n.type === "comment") {
      div.innerHTML = "💬 Someone commented on your post";
    }

    container.appendChild(div);
  });
}

function showHeart(parent) {
  for (let i = 0; i < 5; i++) {
    const heart = document.createElement("div");

    heart.innerHTML = "❤️";
    heart.style.position = "absolute";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.fontSize = "30px";
    heart.style.pointerEvents = "none";

    const x = (Math.random() - 0.5) * 100;
    const y = -Math.random() * 150;

    heart.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    heart.style.opacity = "1";
    heart.style.transition = "all 0.8s ease";

    parent.style.position = "relative";
    parent.appendChild(heart);

    setTimeout(() => {
      heart.style.opacity = "0";
      heart.style.transform = `translate(${x}px, ${y - 100}px) scale(1.5)`;
    }, 50);

    setTimeout(() => heart.remove(), 800);
  }
}
function showToast(message) {
  const toast = document.createElement("div");

  toast.innerText = message;
  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = "black";
  toast.style.color = "white";
  toast.style.padding = "10px 20px";
  toast.style.borderRadius = "20px";
  toast.style.opacity = "0";
  toast.style.transition = "all 0.5s";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = "1";
  }, 50);

  setTimeout(() => {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 500);
  }, 2000);
}

  // ✅ REALTIME
  supabase.channel("posts")
    .on("postgres_changes", { event: "*", schema: "public", table: "posts" },
      () => loadPosts()
    )
    .subscribe();

  supabase.channel("comments")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "comments" },
      payload => renderComment(payload.new)
    )
    .subscribe();

  supabase.channel("notifications")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications" },
      () => loadNotifications()
    )
    .subscribe();

  // ✅ START
  loadPosts();
  loadNotifications();
}
</script>
</body>
</html>
