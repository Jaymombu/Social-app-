<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>

  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* MAIN APP */
#app {
  max-width: 500px;
  margin: auto;
}

/* POSTS CONTAINER */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

/* EACH POST (FULL SCREEN) */
.post-card {
  height: 100vh;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

/* MEDIA (VIDEO / IMAGE) */
.post-card video,
.post-card img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT OVERLAY (BOTTOM LEFT) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
  z-index: 2;
}

/* RIGHT SIDE ACTIONS */
.post-actions {
  position: absolute;
  right: 10px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 2;
}

/* BUTTONS */
button {
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 8px;
  border-radius: 50%;
  cursor: pointer;
}

/* COMMENTS PANEL (BOTTOM SHEET STYLE) */
#commentsPanel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  display: flex;
  align-items: flex-end;

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 999;
}

#commentsPanel.active {
  opacity: 1;
  pointer-events: auto;
}

.comments-content {
  background: #111;
  width: 100%;
  height: 60%;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  color: white;

  transform: translateY(100%);
  transition: 0.3s;
}

#commentsPanel.active .comments-content {
  transform: translateY(0);
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* LIKE BUTTON STYLE */
.like-btn {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 6px 12px;
  transition: 0.2s;
}

.like-btn.liked {
  background: #ff4d6d;
}

/* SIMPLE FADE */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kixxdbkfvigunvxbvmfy.supabase.co",
  "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M"
);

let currentPostId = null;

const { data: { session } } = await supabase.auth.getSession();

/* ================= AUTH ================= */

if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {

/* ================= UI ================= */

document.getElementById("app").innerHTML = `
  <h3>Welcome ${session.user.user_metadata.full_name}</h3>

  <textarea id="postInput" placeholder="Write something..."></textarea>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <button id="postBtn">Post</button>

  <div id="preview"></div>

  <button id="logout">Logout</button>

  <h3>Posts</h3>
  <div id="posts"></div>

  <!-- COMMENTS PANEL -->
  <div id="commentsPanel">
    <div class="comments-content">
      <h3>
        Comments 
        <span id="closeComments" style="float:right;cursor:pointer;">✖</span>
      </h3>

      <div id="panelComments"></div>
      <input id="panelInput" placeholder="Write a comment..." />
      <button id="panelPostBtn">Post</button>
    </div>
  </div>
`;

/* ================= LOGOUT ================= */

document.getElementById("logout").onclick = async () => {
  await supabase.auth.signOut();
  location.reload();
};

/* ================= CREATE POST ================= */

document.getElementById("postBtn").onclick = async () => {
  const content = document.getElementById("postInput").value;
  const file = document.getElementById("fileInput").files[0];

  if (!content && !file) return;

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage
      .from("posts_media")
      .upload(fileName, file);

    if (error) return alert(error.message);

    const { data } = supabase.storage
      .from("posts_media")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  await supabase.from("posts").insert([{
    user_id: session.user.id,
    name: session.user.user_metadata.full_name,
    content,
    file_url: fileUrl
  }]);

  loadPosts();
  document.getElementById("postInput").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("preview").innerHTML = "";
};

/* ================= LOAD POSTS ================= */

async function loadPosts() {
  const { data: posts } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("posts");
  container.innerHTML = "";

  if (!posts || posts.length === 0) {
    container.innerHTML = "No posts yet";
    return;
  }

  posts.forEach(renderPost);
}

/* ================= RENDER POST ================= */

function renderPost(post) {
  const div = document.createElement("div");
  div.className = "post-card";

  const media = post.file_url
    ? (/\.(mp4|webm|ogg|mov)$/i.test(post.file_url)
      ? `<video src="${post.file_url}" class="post-video" autoplay muted loop></video>`
      : `<img src="${post.file_url}">`)
    : "";

  div.innerHTML = `
    ${media}

    <div class="post-text">
      <b>${post.name}</b><br>
      ${post.content || ""}
    </div>

    <div class="post-actions">
      <button onclick="likePost(${post.id})">
        ❤️ ${post.likes || 0}
      </button>

      <button onclick="openComments(${post.id})">💬</button>
    </div>
  `;

  document.getElementById("posts").appendChild(div);
}

/* ================= LIKE ================= */

window.likePost = async (id) => {
  const { data: post } = await supabase
    .from("posts")
    .select("likes, liked_by")
    .eq("id", id)
    .single();

  let likedBy = post.liked_by || [];
  const userId = session.user.id;

  const isLiked = likedBy.includes(userId);

  likedBy = isLiked
    ? likedBy.filter(id => id !== userId)
    : [...likedBy, userId];

  const likes = isLiked
    ? (post.likes || 1) - 1
    : (post.likes || 0) + 1;

  await supabase.from("posts").update({
    likes,
    liked_by: likedBy
  }).eq("id", id);

  loadPosts();
};

/* ================= COMMENTS ================= */

window.openComments = (postId) => {
  currentPostId = postId;
  document.getElementById("commentsPanel").classList.add("active");
  loadComments(postId);
};

document.getElementById("closeComments").onclick = () => {
  document.getElementById("commentsPanel").classList.remove("active");
};

async function loadComments(postId) {
  const { data } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId);

  const container = document.getElementById("panelComments");

  container.innerHTML = data.map(c => `
    <div><b>${c.name}</b>: ${c.content}</div>
  `).join("");
}

document.getElementById("panelPostBtn").onclick = async () => {
  const input = document.getElementById("panelInput");

  if (!input.value) return;

  await supabase.from("comments").insert({
    post_id: currentPostId,
    content: input.value,
    user_id: session.user.id,
    name: session.user.user_metadata.full_name
  });

  input.value = "";
  loadComments(currentPostId);
};

/* ================= PREVIEW ================= */

document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];
  const preview = document.getElementById("preview");

  if (!file) return;

  const url = URL.createObjectURL(file);

  preview.innerHTML = file.type.startsWith("video")
    ? `<video src="${url}" controls style="width:100%"></video>`
    : `<img src="${url}" style="width:100%">`;
});

/* ================= START ================= */

loadPosts();

}
</script>
</body>
</html>
