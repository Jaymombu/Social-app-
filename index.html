<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
}

#app {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* Header */
.header {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Inputs */
textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  outline: none;
}

/* Buttons */
button {
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

/* Post Card */
.post-card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  position: relative;
}

/* Post Header */
.post-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #dfe6e9;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  font-weight: bold;
}

.name {
  font-weight: bold;
}

.time {
  font-size: 12px;
  color: gray;
}

/* Actions */
.actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}

/* ❤️ LIKE BUTTON (clean version) */
.like-btn {
  background: #eee;
  border-radius: 20px;
  padding: 6px 12px;
  transition: all 0.18s cubic-bezier(.34,1.56,.64,1); /* 🔥 spring feel */
  transform-origin: center;
}

.like-btn.liked {
  background: #ff4d6d;
  color: white;
}

/* smoother pop */
.like-btn.pop {
  transform: scale(1.25);
}
button:active {
  transform: scale(0.95);
}

.delete-btn {
  background: #ff7675;
  color: white;
}

/* Comments */
.comment-box {
  margin-top: 15px;
}

.comment {
  background: #f1f3f6;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 5px;
  font-size: 14px;
}

/* 💥 BIG HEART */
.big-heart {
  position: absolute;
  transform: translate(-50%, -50%) scale(0.6);
  font-size: 90px;
  opacity: 0;
  animation: bigPop 0.7s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}

@keyframes bigPop {
  0% {
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
  }
  40% {
    transform: translate(-50%, -50%) scale(1.3);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
  }
}

/* ✨ FLOATING HEART */
.floating-heart {
  position: absolute;
  font-size: 22px;
  pointer-events: none;
  animation: floatUp 1.2s ease-out forwards;
  filter: drop-shadow(0 0 6px rgba(255, 0, 100, 0.6));
}

/* ONE float animation only */
@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.8);
    opacity: 1;
  }
  50% {
    transform: translateY(-40px) scale(1.3);
  }
  100% {
    transform: translateY(-100px) scale(1.6);
    opacity: 0;
  }
}
.burst-heart {
  position: absolute;
  transform: translate(-50%, -50%) scale(0.6);
  font-size: 22px;
  pointer-events: none;
  animation: burstAnim 0.8s ease-out forwards;
}

@keyframes burstAnim {
  0% {
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translate(
      calc(-50% + var(--dx)),
      calc(-50% + var(--dy))
    ) scale(1.4);
    opacity: 0;
  }
}

/* ripple effect */
.ripple {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255, 0, 100, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: rippleEffect 0.6s ease-out;
  pointer-events: none;
}

@keyframes rippleEffect {
  to {
    transform: translate(-50%, -50%) scale(8);
    opacity: 0;
  }
}

<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";
const supabase = createClient(supabaseUrl, supabaseKey, {
  auth: {
    detectSessionInUrl: true,
    persistSession: true
  }
});

const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {
  document.getElementById("app").innerHTML = `
  <h3>Welcome ${session.user.user_metadata.full_name}</h3>

  <textarea id="postInput"></textarea><br>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <button id="postBtn">Post</button>

  <div id="preview"></div>

  <button id="logout">Logout</button>

  <h3>Posts</h3>
  <div id="posts"></div>

  <!-- COMMENTS PANEL -->
  <div id="commentsPanel">
    <div class="comments-content" id="commentsContent">
      <h3>
        Comments 
        <span onclick="closeComments()" style="float:right;cursor:pointer;">✖</span>
      </h3>

      <div id="panelComments"></div>
      <input id="panelInput" placeholder="Write a comment..." />
      <button id="panelPostBtn">Post</button>
    </div>
  </div>
`;


  // ✅ LOGOUT
  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  // ✅ CREATE POST
  document.getElementById("postBtn").onclick = async () => {
  const content = document.getElementById("postInput").value;
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  if (!content && !file) return;

  let fileUrl = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage
      .from("posts_media")
      .upload(fileName, file);

    if (error) {
      alert(error.message);
      return;
    }

    const { data } = supabase.storage
      .from("posts_media")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  const { error } = await supabase.from("posts").insert([{
    user_id: session.user.id,
    name: session.user.user_metadata.full_name,
    content,
    file_url: fileUrl
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  // 🔥 refresh UI
  await loadPosts();

  // reset
  document.getElementById("postInput").value = "";
  fileInput.value = "";
  document.getElementById("preview").innerHTML = "";
};

  // ✅ LOAD POSTS
  async function loadPosts() {
    const { data: posts } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "";

    if (!posts) return;
    posts.forEach(renderPost);
  }
  setupAutoPlay();
  
  function setupAutoPlay() {
  const videos = document.querySelectorAll(".post-video");

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target;

      if (entry.isIntersecting) {
        // ⛔ pause ALL other videos first
        document.querySelectorAll(".post-video").forEach(v => {
          if (v !== video) v.pause();
        });

        video.play().catch(() => {});
      } else {
        video.pause();
      }
    });
  }, {
    threshold: 0.7 // slightly stricter = cleaner switching
  });

  videos.forEach(video => observer.observe(video));
}
loadPosts();
console.log("Loading posts...");

  // ✅ RENDER POST
  function renderPost(post) {
    console.log("FILE URL:", post.file_url);
    const postsDiv = document.getElementById("posts");

    if (document.getElementById(post.id)) return;

    const div = document.createElement("div");
    let lastTap = 0;

div.addEventListener("click", () => {
  const now = Date.now();

  if (now - lastTap < 300) {
    likePost(post.id);
    showHeart(div);
  }

  lastTap = now;
});
    div.id = post.id;

    const isLiked = (post.liked_by || []).includes(session.user.id);

div.innerHTML = `
  <div class="post-card" onclick="handleTap(event, ${post.id})" style="position:relative;">

    <b>${post.name}</b><br>
    ${post.content || ""}<br>

    ${post.file_url ? `
      <div style="position:relative;">

        ${
          /\.(mp4|webm|ogg|mov)$/i.test(post.file_url)
          ? `<video 
              src="${post.file_url}" 
              class="post-video"
              playsinline
              muted
              loop
              style="width:100%; border-radius:12px;">
            </video>`
          : `<img 
              src="${post.file_url}" 
              style="width:100%; border-radius:12px;" 
            />`
        }

        <!-- RIGHT SIDE (TikTok style buttons) -->
        <div style="
          position:absolute;
          right:10px;
          bottom:20px;
          display:flex;
          flex-direction:column;
          align-items:center;
          gap:12px;
        ">

          <button 
            onclick="event.stopPropagation(); likePost(${post.id})"
            style="background:none; border:none; color:white; font-size:20px;">
            ${isLiked ? "❤️" : "🤍"}<br>${post.likes || 0}
          </button>

          <button 
            onclick="event.stopPropagation(); openFullscreen(this)"
            style="background:none; border:none; color:white; font-size:20px;">
            ⛶
          </button>

          <a 
            href="${post.file_url}" 
            download 
            onclick="event.stopPropagation();"
            style="color:white; text-decoration:none; font-size:20px;">
            ⬇
          </a>

          ${
            post.user_id === session.user.id
              ? `<button 
                  onclick="event.stopPropagation(); deletePost(${post.id})"
                  style="background:none; border:none; color:red;">
                  🗑
                </button>`
              : ""
          }

        </div>

      </div>
    ` : ""}

    <!-- COMMENTS -->
    <div id="comments-${post.id}"></div>

    <input 
      id="commentInput-${post.id}" 
      placeholder="Comment..." 
      onclick="event.stopPropagation();"
    />

    <button onclick="event.stopPropagation(); openComments(${post.id})">
  💬
</button>

  </div>
`;
setTimeout(setupAutoPlay, 300);

postsDiv.appendChild(div);
loadComments(post.id);
}

  // ✅ DELETE
  window.deletePost = async (id) => {
    await supabase.from("posts").delete().eq("id", id);
  };

  // ✅ LIKE
  window.likePost = async (id) => {
  const el = document.getElementById(id);
  const btn = el.querySelector(".like-btn");

  const userId = session.user.id;

  const { data: post } = await supabase
    .from("posts")
    .select("likes, liked_by, user_id")
    .eq("id", id)
    .single();

  let likedBy = post.liked_by || [];
  let isLiked = likedBy.includes(userId);

  let newLikes;
  let updatedLikedBy;

  if (isLiked) {
    // 🔁 UNLIKE
    updatedLikedBy = likedBy.filter(uid => uid !== userId);
    newLikes = (post.likes || 1) - 1;
  } else {
    // ❤️ LIKE
    updatedLikedBy = [...likedBy, userId];
    newLikes = (post.likes || 0) + 1;

    // 🔔 notification
    if (post.user_id !== userId) {
      await supabase.from("notifications").insert([{
        user_id: post.user_id,
        sender_id: userId,
        post_id: id,
        type: "like"
      }]);
    }
  }

  // ⚡ INSTANT UI UPDATE (no waiting)

const nowLiked = !isLiked;

btn.classList.toggle("liked", nowLiked);

const start = post.likes || 0;
const end = newLikes;
let current = start;

const interval = setInterval(() => {
  current += (end > start ? 1 : -1);

  btn.innerHTML = `${nowLiked ? "❤️" : "🤍"} ${current}`;

  if (current === end) clearInterval(interval);
}, 30);

// ✅ KEEP THIS ONE ONLY
btn.classList.add("pop");
setTimeout(() => btn.classList.remove("pop"), 200);

// 🎨 styles
btn.style.background = nowLiked ? "#ff4d6d" : "#eee";
btn.style.color = nowLiked ? "white" : "black";
btn.style.border = "none";
btn.style.padding = "6px 12px";
btn.style.borderRadius = "20px";

  // 🔄 Save to DB (background)
  await supabase
    .from("posts")
    .update({
      likes: newLikes,
      liked_by: updatedLikedBy
    })
    .eq("id", id);
};
function openComments(postId) {
  document.getElementById("commentsPanel").classList.add("active");
}

  // ✅ COMMENTS
  window.addComment = async (postId) => {
    const input = document.getElementById(`commentInput-${postId}`);
    if (!input.value) return;

    await supabase.from("comments").insert([{
      post_id: postId,
      user_id: session.user.id,
      name: session.user.user_metadata.full_name,
      content: input.value
    }]);

    input.value = "";
  };

  function renderComment(comment) {
    const container = document.getElementById(`comments-${comment.post_id}`);
    if (!container) return;

    const div = document.createElement("div");
    div.innerHTML = `<b>${comment.name}</b>: ${comment.content}`;
    div.style.animation = "fadeIn 0.4s ease forwards";

    container.appendChild(div);
  }

  async function loadComments(postId) {
  const container = document.getElementById("panelComments");

  container.innerHTML = "Loading...";

  const { data, error } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId);

  if (error) {
    container.innerHTML = "Error loading comments";
    return;
  }

  container.innerHTML = data.map(c => `
    <div><b>${c.name || "User"}</b>: ${c.content}</div>
  `).join("");
}

  // ✅ NOTIFICATIONS
  async function loadNotifications() {
  const { data } = await supabase
    .from("notifications")
    .select("*")
    .eq("user_id", session.user.id);

  const container = document.getElementById("notifications");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "No notifications";
    return;
  }

  data.forEach((n) => {
    const div = document.createElement("div");

    if (n.type === "like") {
      div.innerHTML = "❤️ Someone liked your post";
    } else if (n.type === "comment") {
      div.innerHTML = "💬 Someone commented on your post";
    }

    container.appendChild(div);
  });
}

function showHeart(parent) {
  for (let i = 0; i < 5; i++) {
    const heart = document.createElement("div");

    heart.innerHTML = "❤️";
    heart.style.position = "absolute";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.fontSize = "30px";
    heart.style.pointerEvents = "none";

    const x = (Math.random() - 0.5) * 100;
    const y = -80 - Math.random() * 120;
    const rotate = (Math.random() - 0.5) * 40;

    heart.style.transform = `translate(-50%, -50%) scale(0.6)`;
    heart.style.opacity = "0";
    heart.style.transition = "all 0.6s ease";

    parent.style.position = "relative";
    parent.appendChild(heart);

    requestAnimationFrame(() => {
      heart.style.opacity = "1";
      heart.style.transform = `translate(${x}px, ${y}px) scale(1.2) rotate(${rotate}deg)`;
    });

    setTimeout(() => {
      heart.style.opacity = "0";
      heart.style.transform = `translate(${x}px, ${y - 120}px) scale(1.6) rotate(${rotate}deg)`;
    }, 300);

    setTimeout(() => heart.remove(), 700);
  }
}
function showBigHeart(id, e) {
  const post = document.getElementById(id);

  const heart = document.createElement("div");
  heart.className = "big-heart";
  heart.innerHTML = "❤️";

  // 🎯 get tap position
  const rect = post.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  heart.style.left = x + "px";
  heart.style.top = y + "px";

  post.appendChild(heart);

  setTimeout(() => heart.remove(), 700);
}
function createFloatingHearts(id) {
  const el = document.getElementById(id);

  const hearts = ["❤️", "💖", "💜", "💙", "💛"];

  for (let i = 0; i < 8; i++) {
    const heart = document.createElement("div");
    heart.className = "floating-heart";

    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

    // 🎯 more natural randomness
    heart.style.left = Math.random() * 100 + "%";
    heart.style.bottom = "10px";
    heart.style.animationDelay = (Math.random() * 0.3) + "s";

    el.appendChild(heart);

    setTimeout(() => heart.remove(), 1200);
  }
}
function burstHearts(id, e) {
  const post = document.getElementById(id);
  const rect = post.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

   const count = 4 + Math.floor(Math.random() * 6);// number of hearts per burst

  for (let i = 0; i < count; i++) {
    const heart = document.createElement("div");
    heart.className = "burst-heart";
    heart.innerHTML = "❤️";

    // random direction
    const angle = Math.random() * 2 * Math.PI;
    const distance = 60 + Math.random() * 40;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    heart.style.left = x + "px";
    heart.style.top = y + "px";

    heart.style.setProperty("--dx", dx + "px");
    heart.style.setProperty("--dy", dy + "px");

    post.appendChild(heart);

    setTimeout(() => heart.remove(), 800);
  }
}
function showPlusOne(btn) {
  const span = document.createElement("span");
  span.innerHTML = "+1 ❤️";

  span.style.position = "absolute";
  span.style.top = "0";
  span.style.left = "50%";
  span.style.transform = "translateX(-50%)";
  span.style.color = "#ff4d6d";
  span.style.fontSize = "14px";
  span.style.fontWeight = "bold";
  span.style.pointerEvents = "none";
  span.style.opacity = "1";
  span.style.transition = "all 0.6s ease";

  btn.appendChild(span);

  setTimeout(() => {
    span.style.top = "-25px";
    span.style.opacity = "0";
  }, 50);

  setTimeout(() => span.remove(), 600);
}
function openFullscreen(btn) {
  const video = btn.parentElement.querySelector("video");

  if (!video) return;

  if (video.requestFullscreen) {
    video.requestFullscreen();
  } else if (video.webkitRequestFullscreen) {
    video.webkitRequestFullscreen();
  }
}
function showToast(message) {
  const toast = document.createElement("div");

  toast.innerText = message;
  toast.style.position = "fixed";
  toast.style.bottom = "20px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = "black";
  toast.style.color = "white";
  toast.style.padding = "10px 20px";
  toast.style.borderRadius = "20px";
  toast.style.opacity = "0";
  toast.style.transition = "all 0.5s";

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = "1";
  }, 50);

  setTimeout(() => {
    toast.style.opacity = "0";
    setTimeout(() => toast.remove(), 500);
  }, 2000);
}
let lastTap = 0;
let tapTimeout;

window.handleTap = function(e, id) {
  const now = Date.now();
  const delay = now - lastTap;

  if (delay < 300 && delay > 0) {
    clearTimeout(tapTimeout);

    // ❤️ LIKE THE POST (IMPORTANT)
    likePost(id);

    // 💥 animations
    showBigHeart(id, e);
    burstHearts(id, e);
    createRipple(id);

    // 📳 vibration
    if (navigator.vibrate) {
      navigator.vibrate([10, 20, 10]);
    }

    // 🔔 optional toast
    showToast("Liked ❤️");

  } else {
    tapTimeout = setTimeout(() => {
      // single tap (you can add pause/play here later)
    }, 300);
  }

  lastTap = now;
};
document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  if (!file) return;

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("video")) {
    preview.innerHTML = `
      <video src="${url}" controls style="width:100%; border-radius:12px;"></video>
    `;
  } else {
    preview.innerHTML = `
      <img src="${url}" style="width:100%; border-radius:12px;" />
    `;
  }
  
async function loadComments(postId) {
  const container = document.getElementById("panelComments");
  container.innerHTML = "Loading...";

  const { data, error } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId);

  if (error) {
    container.innerHTML = "Error loading comments";
    return;
  }

  container.innerHTML = data.map(c => `
    <div><b>${c.name || "User"}</b>: ${c.content}</div>
  `).join("");
}
