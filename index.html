<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
<style>
  /* RESET */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* 🔥 FULL SCREEN SCROLL */
#posts {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  padding-top: 60px;   /* space for top nav */
  padding-bottom: 70px; /* space for bottom nav */
}

/* 📱 POST CARD */
.post-card {
  height: auto;
  width: 100%;
  position: relative;
  scroll-snap-align: start;
  background: black;
}

/* 🎥 MEDIA FULLSCREEN */
.post-card video,
.post-card img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 📝 TEXT (bottom left) */
.post-text {
  position: absolute;
  bottom: 80px;
  left: 10px;
  color: white;
  z-index: 2;
}

/* ❤️ ACTIONS (right side vertical) */
.post-actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 2;
}

.post-actions button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 50%;
}

/* 🔊 TAP TO UNMUTE */
.video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.tap-unmute {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  pointer-events: none;
}

/* 🔝 TOP NAV */
#topNav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: #aaa;
  font-weight: bold;
  z-index: 1000;
}

#topNav .active {
  color: white;
  border-bottom: 2px solid white;
}

#topNav .search {
  position: absolute;
  right: 15px;
}

/* 🔽 BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 1000;
}

/* ➕ PLUS BUTTON */
#plusBtn {
  background: white;
  color: black;
  font-size: 28px;
  padding: 5px 15px;
  border-radius: 12px;
  position: relative;
}

#plusBtn::before {
  content: "";
  position: absolute;
  left: -5px;
  right: -5px;
  top: 0;
  bottom: 0;
  background: linear-gradient(90deg, cyan, pink);
  border-radius: 14px;
  z-index: -1;
}

/* 📝 CREATE PANEL */
#createPanel {
  position: fixed;
  bottom: 80px;
  left: 10px;
  right: 10px;
  background: #111;
  padding: 10px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
}

/* ❤️ LIKE ANIMATION */
.like-btn.pop {
  transform: scale(1.2);
  transition: 0.2s;
}
#posts {
  position: relative;
  z-index: 1;
}

#topNav {
  z-index: 1000;
}

#bottomNav {
  z-index: 1000;
}

#createPanel {
  z-index: 1001;
}
#commentsPanel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: #111;
  color: white;
  transition: bottom 0.3s ease;
  z-index: 2000;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

#commentsPanel.active {
  bottom: 0;
}

.comments-content {
  padding: 15px;
}

</style>
</head>
<body>

<div id="app"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kixxdbkfvigunvxbvmfy.supabase.co",
  "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M"
);

console.log("🚀 Starting app...");

// ✅ 1. GET SESSION FIRST
let session = null;

try {
  const result = await supabase.auth.getSession();
  session = result.data.session;
  console.log("✅ session:", session);
} catch (err) {
  console.log("❌ session error:", err);
}

// ✅ 2. DEFINE renderPost FIRST (GLOBAL)
function renderPost(post) {
  if (!post.content && !post.file_url) return;

  const postsDiv = document.getElementById("posts");
  const time = new Date(post.created_at).toLocaleString();
  const isOwner = session && session.user.id === post.user_id;
  const isLiked = (post.liked_by || []).includes(session?.user?.id);

  const div = document.createElement("div");

  div.innerHTML = `
    <div style="display:flex; align-items:center; gap:10px;">
      <img 
        src="${post.avatar_url || 'https://via.placeholder.com/40'}"
        style="width:40px;height:40px;border-radius:50%;object-fit:cover;background:#222;"
      />

      <div>
        <div onclick="openProfile('${post.user_id}', '${post.name}')" 
             style="font-weight:bold;cursor:pointer;">
          ${post.name}
        </div>

        <div style="font-size:12px;color:#aaa;">
          ${time}
        </div>
      </div>
    </div>

    <div style="margin-top:10px;">
      ${post.content || ""}
    </div>

    <div style="margin-top:8px;">
      ❤️ ${post.likes || 0}
    </div>

    <button onclick="likePost('${post.id}')" style="
      margin-top:5px;
      background:${isLiked ? '#ff4d6d' : '#222'};
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
    ">
      ${isLiked ? "❤️ Liked" : "🤍 Like"} (${post.likes || 0})
    </button>

    <button onclick="openComments('${post.id}')" style="
      margin-top:5px;
      background:#333;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
    ">
      💬 Comment
    </button>

    ${
      isOwner
        ? `
        <button onclick="deletePost('${post.id}')" style="
          margin-top:8px;
          background:#ff4d4d;
          border:none;
          color:white;
          padding:5px 8px;
          border-radius:5px;
        ">
          Delete
        </button>
      `
        : ""
    }
  `;

  postsDiv.appendChild(div);
}

// ✅ 3. DEFINE loadPosts
window.loadPosts = async function () {
  console.log("🔥 loadPosts running...");

  const { data: posts, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  console.log("📦 posts:", posts);
  console.log("❌ error FULL:", JSON.stringify(error, null, 2));

  const postsDiv = document.getElementById("posts");

  if (!postsDiv) {
    console.log("🚨 posts div NOT FOUND");
    return;
  }

  postsDiv.innerHTML = "";

  if (error) {
    postsDiv.innerHTML = "❌ Error loading posts";
    return;
  }

  if (!posts || posts.length === 0) {
    postsDiv.innerHTML = "😢 No posts yet";
    return;
  }

  posts.forEach(renderPost);
}; // ✅ IMPORTANT (you were missing this)

window.likePost = async (id) => {
  const userId = session?.user?.id;

  if (!userId) {
    alert("Login to like posts");
    return;
  }

  const postDiv = document.getElementById(id);
  const btn = postDiv?.querySelector("button");

  // get current post
  const { data: post, error } = await supabase
    .from("posts")
    .select("likes, liked_by")
    .eq("id", id)
    .single();

  if (error) {
    console.log("❌ fetch error:", error);
    return;
  }

  let likedBy = post.liked_by || [];
  const isLiked = likedBy.includes(userId);

  let newLikes;
  let updatedLikedBy;

  if (isLiked) {
    updatedLikedBy = likedBy.filter(uid => uid !== userId);
    newLikes = (post.likes || 1) - 1;
  } else {
    updatedLikedBy = [...likedBy, userId];
    newLikes = (post.likes || 0) + 1;
  }

  // ✅ INSTANT UI UPDATE (no waiting)
  if (btn) {
    btn.innerHTML = `${!isLiked ? "❤️ Liked" : "🤍 Like"} (${newLikes})`;
    btn.style.background = !isLiked ? "#ff4d6d" : "#222";
  }

  // 🔥 save to database
  await supabase
    .from("posts")
    .update({
      likes: newLikes,
      liked_by: updatedLikedBy
    })
    .eq("id", id);

  // ❌ REMOVE THIS (realtime will handle updates)
  // loadPosts();
};

window.deletePost = async (id) => {
  const { error } = await supabase.from("posts").delete().eq("id", id);

  if (error) {
    console.log("❌ delete error:", error);
    return;
  }

  loadPosts();
};

let currentPostId = null;

window.openComments = (postId) => {
  console.log("💬 opening comments for:", postId);

  currentPostId = postId;

  const panel = document.getElementById("commentsPanel");
  panel.style.display = "flex";

  loadComments(postId);
};

async function loadComments(postId) {
  console.log("📥 loading comments for:", postId);

  const { data, error } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  const container = document.getElementById("panelComments");

  if (error) {
    console.log("❌ comment error:", error);
    container.innerHTML = "Error loading comments";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "No comments yet";
    return;
  }

  container.innerHTML = data.map(c => `
    <div style="margin-bottom:5px;">
      <b>${c.name}</b>: ${c.content}
    </div>
  `).join("");
}

window.openProfile = async (userId, name) => {
  console.log("👤 open profile:", userId);

  document.getElementById("app").innerHTML = `
    <div style="padding:15px; color:white;">
      
      <button onclick="goHome()" style="
        margin-bottom:10px;
        background:#333;
        color:white;
        border:none;
        padding:6px 10px;
        border-radius:6px;
      ">
        ← Back
      </button>

      <h2>${name}</h2>

      <div id="profilePosts"></div>
    </div>
  `;

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .eq("user_id", userId)
    .order("created_at", { ascending: false });

  const container = document.getElementById("profilePosts");

  if (error) {
    container.innerHTML = "Error loading posts";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "No posts yet";
    return;
  }

  container.innerHTML = data.map(post => `
    <div style="border-bottom:1px solid #333; padding:10px 0;">
      <div>${post.content || ""}</div>
      <div style="font-size:12px;color:#aaa;">
        ${new Date(post.created_at).toLocaleString()}
      </div>
    </div>
  `).join("");
};
window.goHome = () => {
  location.reload();
};

supabase
  .channel("posts-channel")
  .on(
    "postgres_changes",
    {
      event: "*", // INSERT, DELETE, UPDATE
      schema: "public",
      table: "posts"
    },
    (payload) => {
      console.log("🔄 change detected:", payload);
      loadPosts(); // reload automatically
    }
  )
  .subscribe();

// ✅ ALWAYS show posts UI
document.getElementById("app").innerHTML = `
  <div style="padding: 10px;">

    ${
      session
        ? `
      <div style="
        margin-bottom: 15px;
        background: #111;
        padding: 10px;
        border-radius: 10px;
      ">
        <textarea 
          id="postInput"
          placeholder="What's on your mind?"
          style="
            width: 100%;
            height: 60px;
            background: #000;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px;
          "
        ></textarea>

        <button id="postBtn" style="
          margin-top: 8px;
          padding: 8px 12px;
          background: #1d9bf0;
          border: none;
          color: white;
          border-radius: 6px;
        ">
          Post
        </button>
      </div>
      `
        : `
      <button id="login" style="margin-bottom:10px;">
        Login
      </button>
      `
    }
    
    

    <div id="posts"></div>
  </div>
  
  <div id="commentsPanel" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60%;
  background:#111;
  color:white;
  display:none;
  flex-direction:column;
  padding:10px;
  z-index:1000;
">
  <h3>
    Comments
    <span id="closeComments" style="float:right;cursor:pointer">✖</span>
  </h3>

  <div id="panelComments" style="flex:1;overflow-y:auto;"></div>

  <input id="panelInput" placeholder="Write comment..." />
  <button id="panelPostBtn">Post</button>
</div>
`;

// ==============================
// COMMENTS PANEL ACTIONS
// ==============================

document.getElementById("panelPostBtn").onclick = async () => {
  const input = document.getElementById("panelInput");

  if (!input.value) return;

  await supabase.from("comments").insert({
    post_id: currentPostId,
    content: input.value,
    user_id: session?.user?.id || null,
    name: session?.user?.email || "Guest"
  });

  input.value = "";
  loadComments(currentPostId);
};

document.getElementById("closeComments").onclick = () => {
  document.getElementById("commentsPanel").style.display = "none";
};


// ==============================
// LOGIN BUTTON (ONLY IF NOT LOGGED IN)
// ==============================

if (!session) {
  const loginBtn = document.getElementById("login");

  if (loginBtn) {
    loginBtn.onclick = async () => {
      await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: location.href
        }
      });
    };
  }
}


// ==============================
// POST BUTTON (ONLY IF LOGGED IN)
// ==============================

if (session) {
  const postBtn = document.getElementById("postBtn");

  if (postBtn) {
    postBtn.onclick = async () => {
      const input = document.getElementById("postInput");
      const content = input.value.trim();

      if (!content) return;

      console.log("📤 posting:", content);

      const { error } = await supabase.from("posts").insert([
        {
          content: content,
          user_id: session.user.id,
          name: session.user.email
        }
      ]);

      if (error) {
        console.log("❌ post error:", error);
        return;
      }

      input.value = "";
      loadPosts();
    };
  }
}


// ==============================
// LOAD POSTS
// ==============================

// Load posts once
loadPosts();


// 🔥 POSTS REALTIME
supabase
  .channel("posts-realtime")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "posts" },
    () => {
      loadPosts();
    }
  )
  .subscribe();


// 💬 COMMENTS REALTIME (ADD THIS RIGHT HERE)
supabase
  .channel("comments-realtime")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "comments" },
    () => {
      if (currentPostId) {
        loadComments(currentPostId);
      }
    }
  )
  .subscribe();
</script>
</body>
</html>
