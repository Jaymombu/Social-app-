<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <title>Social App</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
}

#app {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* Header */
.header {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Input */
textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  outline: none;
}

/* Buttons */
button {
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

/* Post Card */
.post-card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* Post Header */
.post-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #dfe6e9;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  font-weight: bold;
}

.name {
  font-weight: bold;
}

.time {
  font-size: 12px;
  color: gray;
}

/* Actions */
.actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}

.like-btn {
  background: #ffeaa7;
}
.like-btn {
  display: inline-block;
  transition: transform 0.2s ease;
}

.like-btn:active {
  transform: scale(1.3);
}

.edit-btn {
  background: #dfe6e9;
}

.delete-btn {
  background: #ff7675;
  color: white;
}

/* Comments */
.comment-box {
  margin-top: 15px;
}

.comment {
  background: #f1f3f6;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 5px;
  font-size: 14px;
}
.heart-pop {
  position: absolute;
  font-size: 18px;
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% {
    transform: scale(0.6) translateY(0) rotate(0deg);
    opacity: 1;
  }
  50% {
    transform: scale(1.3) translateY(-20px) rotate(10deg);
  }
  100% {
    transform: scale(1) translateY(-60px) rotate(-10deg);
    opacity: 0;
  }
}
.big-heart {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 80px; /* bigger */
  opacity: 0;
  animation: bigPop 0.8s ease forwards;
  pointer-events: none;
}

@keyframes bigPop {
  0% {
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
  }
  40% {
    transform: translate(-50%, -50%) scale(1.4);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
  }
}
.floating-heart {
  position: absolute;
  font-size: 22px;
  pointer-events: none;
  animation: floatUp 1.2s ease-out forwards;
  filter: drop-shadow(0 0 6px rgba(255, 0, 100, 0.6));
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.8) rotate(0deg);
    opacity: 1;
  }
  50% {
    transform: translateY(-40px) scale(1.3) rotate(15deg);
  }
  100% {
    transform: translateY(-100px) scale(1.6) rotate(-10deg);
    opacity: 0;
  }
}
#posts div {
  position: relative;
}
.like-btn {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* 💥 click animation */
.like-btn.animate {
  transform: scale(1.3);
  box-shadow: 0 0 10px rgba(255, 200, 0, 0.8);
}

/* ✨ subtle bounce back */
@keyframes likePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.like-btn.pop {
  animation: likePop 0.3s ease;
}
.ripple {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255, 0, 100, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: rippleEffect 0.6s ease-out;
  pointer-events: none;
}

@keyframes rippleEffect {
  to {
    transform: translate(-50%, -50%) scale(8);
    opacity: 0;
  }
}
.like-btn.pop {
  transform: scale(1.25);
  background: #ffe066;
  transition: 0.2s;
}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://kixxdbkfvigunvxbvmfy.supabase.co";
const supabaseKey = "sb_publishable_wNYHEKrHg_MdxfXtECTzRw_14IREB0M";
const supabase = createClient(supabaseUrl, supabaseKey);

// auth redirect
await supabase.auth.exchangeCodeForSession(window.location.href);

const { data } = await supabase.auth.getSession();
window.session = data.session;

if (!session) {
  document.getElementById("app").innerHTML = `
    <button id="login">Login with Google</button>
  `;

  document.getElementById("login").onclick = async () => {
    await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://jaymombu.github.io/Social-app-/"
      }
    });
  };

} else {

  document.getElementById("app").innerHTML = `
    <h3>Welcome ${session.user.user_metadata.full_name}</h3>

    <textarea id="postInput"></textarea><br>
    <button id="postBtn">Post</button>
    <button id="logout">Logout</button>

    <h3>Posts</h3>
    <div id="posts"></div>
  `;

  document.getElementById("logout").onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  // ✅ CREATE POST (no fake render)
  document.getElementById("postBtn").onclick = async () => {
    const content = document.getElementById("postInput").value;

    if (!content) return;

    await supabase.from("posts").insert([{
      user_id: session.user.id,
      name: session.user.user_metadata.full_name || session.user.email,
      content
    }]);

    document.getElementById("postInput").value = "";
  };

  // ✅ LOAD POSTS ONCE
  async function loadPosts() {
  const { data: posts, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  console.log(posts, error); // 👈 ADD THIS

  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  if (error) {
  console.error(error);
  return;
}

if (!posts) return;

posts.forEach(renderPost);
}

  // ✅ RENDER POST
  async function renderPost(post) {
    const postsDiv = document.getElementById("posts");

    // prevent duplicates
    if (document.getElementById(post.id)) return;

    const div = document.createElement("div");
    div.id = post.id;

    div.innerHTML = `
  <div class="post-card" style="position: relative;" onclick="handleTap(${post.id})">

    <div class="post-header">
      <div class="avatar">
        ${post.name ? post.name[0] : "U"}
      </div>
      <div>
        <div class="name">${post.name}</div>
        <div class="time">
          ${new Date(post.created_at).toLocaleString()}
        </div>
      </div>
    </div>

    <div class="post-content">${post.content}</div>

    <div class="actions">
      <button class="like-btn" onclick="likePost(${post.id})">
        👍 ${post.likes || 0}
      </button>

      ${
        post.user_id === session.user.id
        ? `
          <button class="edit-btn" onclick="editPost(${post.id})">Edit</button>
          <button class="delete-btn" onclick="deletePost(${post.id})">Delete</button>
        `
        : ""
      }
    </div>

    <div class="comment-box">
      <div id="comments-${post.id}"></div>

      <input id="commentInput-${post.id}" placeholder="Write a comment..." />
      <button onclick="addComment(${post.id})">Post</button>
    </div>

  </div>
`;

    postsDiv.appendChild(div);

    loadComments(post.id);
  }

  // ✅ REALTIME (THE RIGHT WAY)
  supabase
    .channel("posts")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "posts" },
      payload => renderPost(payload.new))
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "posts" },
      payload => updatePostUI(payload.new))
    .on("postgres_changes", { event: "DELETE", schema: "public", table: "posts" },
      payload => removePost(payload.old.id))
    .subscribe();
    
    // 🔥 COMMENTS REALTIME
supabase
  .channel("comments-channel")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "comments" },
    (payload) => {
      renderComment(payload.new);
    }
  )
  .subscribe();

  // ✅ DELETE
  window.deletePost = async (id) => {
    if (!confirm("Delete?")) return;
    await supabase.from("posts").delete().eq("id", id);
  };

  function removePost(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ✅ EDIT
  window.editPost = async (id) => {
  const { data } = await supabase
    .from("posts")
    .select("content")
    .eq("id", id)
    .single();

  const newContent = prompt("Edit post:", data.content);
  if (!newContent) return;

  await supabase
    .from("posts")
    .update({ content: newContent })
    .eq("id", id);
};

  function updatePostUI(post) {
  const el = document.getElementById(post.id);
  if (!el) return;

  const contentDiv = el.querySelector(".post-content");
  if (contentDiv) {
    contentDiv.textContent = post.content;
  }
}

  // ✅ LIKE
  window.likePost = async (id) => {
  const el = document.getElementById(id);
  const btn = el.querySelector(".like-btn");

  // 💥 animation
  btn.classList.add("pop");
  setTimeout(() => btn.classList.remove("pop"), 300);

  const { data } = await supabase
    .from("posts")
    .select("likes")
    .eq("id", id)
    .single();

  const newLikes = (data.likes || 0) + 1;

  await supabase
    .from("posts")
    .update({ likes: newLikes })
    .eq("id", id);

  btn.innerHTML = `👍 ${newLikes}`;

  // 💖 MULTIPLE HEARTS (FIXED)
  for (let i = 0; i < 5; i++) {
    const heart = document.createElement("div");
    heart.className = "heart-pop";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 80 + "%";
    heart.style.top = "50%";
    heart.style.fontSize = (16 + Math.random() * 14) + "px";
    heart.style.animationDelay = (Math.random() * 0.3) + "s";

    el.appendChild(heart);

    setTimeout(() => heart.remove(), 1000);
  }
};

  // ✅ COMMENTS
  window.addComment = async (postId) => {
  const input = document.getElementById(`commentInput-${postId}`);
  const content = input.value;

  if (!content) return;

  const { data } = await supabase
    .from("comments")
    .insert([{
      post_id: postId,
      user_id: session.user.id,
      name: session.user.user_metadata.full_name,
      content
    }])
    .select(); // 🔥 IMPORTANT

  renderComment(data[0]); // 🔥 show instantly

  input.value = "";
};
let lastTap = 0;

window.handleTap = function(id) {
  const now = Date.now();

  if (now - lastTap < 300) {
    likePost(id);

    showBigHeart(id);
    createFloatingHearts(id);
    createRipple(id); // 🔥 NEW

    if (navigator.vibrate) navigator.vibrate(40); // stronger feedback
  }

  lastTap = now;
};
function showBigHeart(id) {
  const el = document.getElementById(id);

  const heart = document.createElement("div");
  heart.className = "big-heart";
  heart.innerHTML = "❤️";

  el.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 800);
}

  async function loadComments(postId) {
  const container = document.getElementById(`comments-${postId}`);
  // ✅ use postId, not comment.post_id

  if (!container) return;

  const { data: comments } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", postId)
    .order("created_at", { ascending: true });

  container.innerHTML = "";

  comments.forEach(comment => {
    renderComment(comment);
  });
}
function createFloatingHearts(id) {
  const el = document.getElementById(id);

  const hearts = ["❤️", "💖", "💜", "💙", "💚", "💛"];

  for (let i = 0; i < 8; i++) {
    const heart = document.createElement("div");
    heart.className = "floating-heart";

    // random emoji
    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

    // random position
    heart.style.left = Math.random() * 90 + "%";
    heart.style.bottom = "10px";

    // random delay
    heart.style.animationDelay = (Math.random() * 0.4) + "s";

    el.appendChild(heart);

    setTimeout(() => heart.remove(), 1200);
  }
}

// ✅ ADD THIS RIGHT BELOW
function renderComment(comment) {
  const container = document.getElementById(`comments-${comment.post_id}`);
  if (!container) return;

  // 🔥 prevent duplicates
  if (document.getElementById(`comment-${comment.id}`)) return;

  const div = document.createElement("div");
  div.id = `comment-${comment.id}`;

  div.innerHTML = `
  <div class="comment">
    <strong>${comment.name}</strong><br>
    ${comment.content}
  </div>
`;

  container.appendChild(div);
}
function createRipple(id) {
  const el = document.getElementById(id);

  const ripple = document.createElement("div");
  ripple.className = "ripple";

  ripple.style.left = "50%";
  ripple.style.top = "50%";

  el.appendChild(ripple);

  setTimeout(() => ripple.remove(), 600);
}
supabase
  .channel("posts-changes")
  .on(
    "postgres_changes",
    {
      event: "UPDATE",
      schema: "public",
      table: "posts"
    },
    (payload) => {
      const updatedPost = payload.new;

      const el = document.getElementById(updatedPost.id);
      if (!el) return;

      const btn = el.querySelector(".like-btn");
      if (btn) {
        btn.innerHTML = `👍 ${updatedPost.likes || 0}`;
        btn.classList.add("like-animate");

        setTimeout(() => {
          btn.classList.remove("like-animate");
        }, 300);
      }
    }
  )
  .subscribe();

  // 🔥 START APP
  loadPosts();

window.likePost = likePost;
window.deletePost = deletePost;
window.editPost = editPost;
window.addComment = addComment;
}
</script>
</body>
</html>
